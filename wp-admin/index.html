<html lang="uk-UA">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="WordPress admin login" />
  <link rel="icon" href="/wp-content/themes/nova-impact/assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/wp-content/themes/nova-impact/assets/css/style.css" />

<body class="wp-login-page login login-action-login wp-core-ui locale-uk">
  <main class="wp-login-wrap" aria-label="WordPress login">
    <div class="wp-logo" aria-label="WordPress">W</div>
    <form class="wp-login-card" method="post" action="/wp-login.php" autocomplete="on">
      <p>
        <label for="user_login">Ім'я користувача або Email адреса</label>
        <input type="text" name="log" id="user_login" class="input" value="" size="20" autocapitalize="off" autocomplete="username" />
      </p>
      <p class="wp-pass-row">
        <label for="user_pass">Пароль</label>
        <input type="password" name="pwd" id="user_pass" class="input password-input" value="" size="20" autocomplete="current-password" />
        <button class="wp-eye" type="button" aria-label="Показати пароль">◉</button>
      </p>
      <div class="wp-login-actions">
        <label class="wp-remember"><input name="rememberme" type="checkbox" id="rememberme" value="forever" /> Запам'ятати мене</label>
        <button type="button" class="wp-submit">Увійти</button>
      </div>
    </form>
    <nav class="wp-links" aria-label="Login links">
      <a href="#">Втратили свій пароль?</a>
      <a href="/">← Назад до Nova Impact Studio</a>
    </nav>
    <p class="wp-policy"><a href="#">Політика конфіденційності</a></p>
    <form class="wp-language">
      <select aria-label="Мова"><option selected>Українська</option><option>English (United States)</option><option>Русский</option></select>
      <button type="button">Змінити</button>
    </form>
  </main>
</body>
</html>
